name: Publish landing page

# GitHub Pages serves the gh-pages branch. This keeps that branch in sync
# with docs/ on main, so editing the page and pushing is all it takes.
on:
  push:
    branches: [main]
    paths: ["docs/**"]

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Push docs/ to gh-pages
        run: |
          cd docs
          git init -b gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Publish landing page from ${GITHUB_SHA::7}"
          git push --force "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${GITHUB_REPOSITORY}.git" gh-pages
